<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบสมัครเรียน - โรงเรียนบ้านคลอง 14</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f4f6f9; }
        .card { border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card p-4">
                <h3 class="text-center mb-4">ฟอร์มสมัครเรียน - โรงเรียนบ้านคลอง 14</h3>
                
                <form id="admissionForm">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label>ปีการศึกษา</label>
                            <input type="number" class="form-control" id="academicYear" value="2568" required>
                        </div>
                        <div class="col-md-6">
                            <label>เลขประจำตัวประชาชน (13 หลัก)</label>
                            <input type="text" class="form-control" id="idCard" required maxlength="13">
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-3">
                            <label>คำนำหน้า</label>
                            <select class="form-select" id="prefix">
                                <option value="ด.ช.">ด.ช.</option>
                                <option value="ด.ญ.">ด.ญ.</option>
                                <option value="นาย">นาย</option>
                                <option value="นางสาว">นางสาว</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label>ชื่อ</label>
                            <input type="text" class="form-control" id="firstName" required>
                        </div>
                        <div class="col-md-5">
                            <label>นามสกุล</label>
                            <input type="text" class="form-control" id="lastName" required>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-12">
                            <label>รูปถ่ายผู้สมัคร (ขนาดไม่เกิน 2MB)</label>
                            <input type="file" class="form-control" id="photoFile" accept="image/*">
                        </div>
                    </div>

                    <!-- สามารถเพิ่มฟิลด์อื่นๆ ตามภาพ สพฐ. ได้ที่นี่ -->

                    <button type="submit" class="btn btn-primary w-100 mt-3" id="submitBtn">
                        บันทึกข้อมูลสมัครเรียน
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    // --- เปลี่ยน URL ตรงนี้เป็นของ Web App ของคุณ ---
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyF5MTuzox5H4XQZE2ViHIdQ5QU-OiSxAGW2LcIjJs6NzsRHnzo5hx7EQfjpXKPZb8B/exec";

    document.getElementById('admissionForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const btn = document.getElementById('submitBtn');
        btn.innerHTML = 'กำลังบันทึกข้อมูล... <span class="spinner-border spinner-border-sm"></span>';
        btn.disabled = true;

        // ดึงไฟล์รูปมาแปลงเป็น Base64
        const fileInput = document.getElementById('photoFile');
        let photoBase64 = "";
        
        if (fileInput.files.length > 0) {
            const file = fileInput.files[0];
            photoBase64 = await toBase64(file);
        }

        // จัดเตรียมข้อมูล
        const payload = {
            action: 'submitApplication',
            data: {
                academicYear: document.getElementById('academicYear').value,
                idCard: document.getElementById('idCard').value,
                prefix: document.getElementById('prefix').value,
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                photoBase64: photoBase64
            }
        };

        // ส่งข้อมูลไปยัง Google Apps Script
        fetch(WEB_APP_URL, {
            method: 'POST',
            body: JSON.stringify(payload)
        })
        .then(response => response.json())
        .then(res => {
            if(res.status === 'success') {
                alert('สมัครเรียนสำเร็จ!');
                document.getElementById('admissionForm').reset();
            } else {
                alert('เกิดข้อผิดพลาด: ' + res.message);
            }
        })
        .catch(err => alert('เชื่อมต่อเซิร์ฟเวอร์ไม่ได้'))
        .finally(() => {
            btn.innerHTML = 'บันทึกข้อมูลสมัครเรียน';
            btn.disabled = false;
        });
    });

    // ฟังก์ชันแปลงไฟล์เป็น Base64
    const toBase64 = file => new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
    });
</script>

</body>
</html>
